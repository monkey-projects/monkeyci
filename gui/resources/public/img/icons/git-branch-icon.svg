<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="24" height="24" fill="none">

  <!-- Duotone: dark green base + bright green accent -->
  <!-- Base color: #035A4B  Accent color: #4ade80 -->

  <!-- ── Vertical stem: commit node → branch point ── -->
  <line x1="20" y1="16" x2="20" y2="48" opacity="0.3"
        stroke="#035A4B" stroke-width="4" stroke-linecap="round"/>

  <!-- ── Branch arm: branch point → branch tip ── -->
  <path d="M20 24 C20 32 44 32 44 18"
        stroke="#035A4B" stroke-width="4" opacity="0.3"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- ── Top commit node (main) ── -->
  <circle cx="20" cy="14" r="5.5" fill="#035A4B" opacity="0.3"/>
  <circle cx="20" cy="14" r="2.5" fill="#035A4B"/>

  <!-- ── Bottom commit node (main) ── -->
  <circle cx="20" cy="50" r="5.5" fill="#035A4B"/>
  <circle cx="20" cy="50" r="2.5" fill="#035A4B" opacity="0.3"/>

  <!-- ── Branch tip node ── -->
  <circle cx="44" cy="16" r="5.5" fill="#035A4B" opacity="0.3"/>
  <circle cx="44" cy="16" r="2.5" fill="#035A4B"/>

</svg>
